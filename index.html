<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff5f8f" />
  <title>Una pregunta importante 💖</title>

  <style>
    :root {
      --rosa: #ff5f8f;
      --rosa-oscuro: #e83e72;
      --rosa-claro: #ffe6ef;
      --texto: #4a2432;
      --blanco: #ffffff;
      --sombra: 0 18px 45px rgba(123, 35, 69, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.8), transparent 25%),
        radial-gradient(circle at 85% 15%, rgba(255, 255, 255, 0.6), transparent 22%),
        linear-gradient(135deg, #ffd4e2 0%, #ff9fbe 50%, #ff6d9b 100%);
      color: var(--texto);
      touch-action: manipulation;
    }

    body {
      display: grid;
      place-items: center;
      padding:
        max(20px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -60px;
      opacity: 0.35;
      animation: flotar linear infinite;
      user-select: none;
    }

    @keyframes flotar {
      from {
        transform: translateY(0) rotate(0deg);
      }
      to {
        transform: translateY(-120vh) rotate(360deg);
      }
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(92vw, 520px);
      padding: clamp(28px, 7vw, 48px);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--sombra);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.65);
    }

    .emoji {
      display: block;
      margin-bottom: 10px;
      font-size: clamp(54px, 14vw, 82px);
      animation: latido 1.25s ease-in-out infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 8vw, 48px);
      line-height: 1.08;
    }

    p {
      margin: 18px auto 28px;
      max-width: 420px;
      font-size: clamp(17px, 4.5vw, 21px);
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      min-height: 58px;
    }

    button {
      min-width: 120px;
      min-height: 54px;
      padding: 14px 26px;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 10px 22px rgba(123, 35, 69, 0.2);
      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        background 160ms ease;
    }

    button:active {
      transform: scale(0.96);
    }

    #yesBtn {
      color: var(--blanco);
      background: linear-gradient(135deg, var(--rosa), var(--rosa-oscuro));
    }

    #yesBtn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 14px 28px rgba(232, 62, 114, 0.32);
    }

    #noBtn {
      position: relative;
      z-index: 999;
      color: var(--rosa-oscuro);
      background: var(--rosa-claro);
      border: 2px solid rgba(232, 62, 114, 0.2);
      will-change: left, top, transform;
    }

    #message {
      display: none;
      margin-top: 24px;
      padding: 18px;
      border-radius: 18px;
      background: #fff1f6;
      font-size: clamp(19px, 5vw, 24px);
      font-weight: 800;
      color: var(--rosa-oscuro);
    }

    .firma {
      margin-top: 22px;
      font-size: 14px;
      opacity: 0.65;
    }

    @media (max-width: 420px) {
      .card {
        padding: 26px 20px;
      }

      .buttons {
        gap: 12px;
      }

      button {
        min-width: 110px;
        padding-inline: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .heart,
      .emoji {
        animation: none;
      }

      button {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div class="hearts" aria-hidden="true" id="hearts"></div>

  <main class="card">
    <span class="emoji">💖</span>
    <h1>¿Quieres ser mi novia?</h1>
    <p>
      Desde que te conocí, cada momento contigo se volvió mucho más bonito.
      Me encantaría seguir creando recuerdos a tu lado.
    </p>

    <div class="buttons">
      <button id="yesBtn" type="button">Sí 💕</button>
      <button id="noBtn" type="button">No 🙈</button>
    </div>

    <div id="message" role="status" aria-live="polite">
      ¡Sabía que dirías que sí! 💘🥰
    </div>

    <div class="firma">Hecho con mucho cariño ✨</div>
  </main>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");
    const heartsContainer = document.getElementById("hearts");

    let isFloating = false;

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function moveNoButton() {
      const margin = 12;
      const buttonRect = noBtn.getBoundingClientRect();

      const maxX = Math.max(margin, window.innerWidth - buttonRect.width - margin);
      const maxY = Math.max(margin, window.innerHeight - buttonRect.height - margin);

      const x = randomBetween(margin, maxX);
      const y = randomBetween(margin, maxY);

      if (!isFloating) {
        noBtn.style.position = "fixed";
        noBtn.style.margin = "0";
        isFloating = true;
      }

      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
      noBtn.style.transform = `rotate(${randomBetween(-12, 12)}deg)`;
    }

    // Mouse, stylus y Android moderno.
    noBtn.addEventListener("pointerenter", moveNoButton);

    noBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();
      moveNoButton();
    });

    // Respaldo para navegadores móviles antiguos.
    noBtn.addEventListener(
      "touchstart",
      (event) => {
        event.preventDefault();
        event.stopPropagation();
        moveNoButton();
      },
      { passive: false }
    );

    // Evita que un clic accidental consiga activar el botón.
    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      moveNoButton();
    });

    noBtn.addEventListener("focus", moveNoButton);

    yesBtn.addEventListener("click", () => {
      message.style.display = "block";
      yesBtn.textContent = "¡Sí! 💞";
      noBtn.style.display = "none";

      document.querySelector("h1").textContent = "¡Ahora somos novios! 💖";
      document.querySelector("p").textContent =
        "Prometo hacer todo lo posible para que esta nueva historia sea muy bonita.";

      lanzarCorazones();
    });

    function crearCorazonesDeFondo() {
      const symbols = ["💗", "💖", "💕", "💘", "🌸"];

      for (let i = 0; i < 18; i++) {
        const heart = document.createElement("span");
        heart.className = "heart";
        heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.fontSize = `${randomBetween(18, 38)}px`;
        heart.style.animationDuration = `${randomBetween(7, 14)}s`;
        heart.style.animationDelay = `${randomBetween(-14, 0)}s`;
        heartsContainer.appendChild(heart);
      }
    }

    function lanzarCorazones() {
      const symbols = ["💗", "💖", "💕", "💘", "🥰"];

      for (let i = 0; i < 32; i++) {
        const heart = document.createElement("span");
        heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        heart.style.position = "fixed";
        heart.style.left = "50%";
        heart.style.top = "55%";
        heart.style.zIndex = "9999";
        heart.style.pointerEvents = "none";
        heart.style.fontSize = `${randomBetween(20, 38)}px`;
        heart.style.transition = "transform 1.3s ease-out, opacity 1.3s ease-out";
        document.body.appendChild(heart);

        const x = randomBetween(-window.innerWidth * 0.48, window.innerWidth * 0.48);
        const y = randomBetween(-window.innerHeight * 0.55, window.innerHeight * 0.2);
        const rotation = randomBetween(-220, 220);

        requestAnimationFrame(() => {
          heart.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
          heart.style.opacity = "0";
        });

        setTimeout(() => heart.remove(), 1400);
      }
    }

    window.addEventListener("resize", () => {
      if (isFloating) moveNoButton();
    });

    crearCorazonesDeFondo();
  </script>
</body>
</html>
